<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden; 
            background-color: #F4F4F4;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #root-container {
            width: 1280px;
            height: 720px;
            transform-origin: center center;
            flex-shrink: 0;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .canvas-bg {
            width: 100%;
            height: 100%;
            background-color: #FFFFFF;
            background-image: radial-gradient(#EAEAEA 1.5px, transparent 0);
            background-size: 24px 24px;
            display: flex;
            flex-direction: column; 
            border: 4px solid #FFDD33;
            position: relative;
            overflow: hidden;
        }

        .sharp-text {
            transform: none !important;
            backface-visibility: hidden;
        }

        .miro-highlight {
            background-color: #FFDD33;
            padding: 2px 12px;
            border-radius: 8px;
            display: inline-block;
            box-shadow: 4px 4px 0px #1C1C1E;
        }

        .blueprint-card {
            background-color: #FFFFFF;
            border: 4px solid #1C1C1E;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            position: relative;
        }

        .blueprint-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 0px 0px #1C1C1E;
        }

        .blueprint-card.active {
            background-color: #1C1C1E;
            color: white;
            box-shadow: 0 8px 0px 0px #FFDD33;
        }

        .outcome-tag {
            background-color: #FFDD33;
            color: #1C1C1E;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.05em;
            box-shadow: 2px 2px 0px #1C1C1E;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .animate-slide {
            animation: slideIn 0.4s ease-out forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #1C1C1E;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root-container">
        <div id="root" style="width: 100%; height: 100%;"></div>
    </div>

                    if (container) {
                        const scale = Math.min(window.innerWidth / 1320, window.innerHeight / 760);
                        container.style.transform = `scale(${scale})`;
                    }
                };
                window.addEventListener('resize', scaler);
                scaler();
                return () => window.removeEventListener('resize', scaler);
            }, []);
