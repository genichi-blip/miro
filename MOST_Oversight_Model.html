<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOST PS 運用モデル - プロフェッショナル・ハブ</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&display=swap');
        
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            overflow-y: auto; 
            background-color: #F4F4F4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: auto;
        }

        #root-container {
            width: 1920px;
            transform-origin: top center;
            flex-shrink: 0;
            position: relative;
            margin-bottom: 0; 
            backface-visibility: hidden;
            transform: perspective(1000px) translate3d(0,0,0);
            will-change: transform;
        }

        .canvas-bg {
            width: 100%;
            background-color: #FFFFFF;
            background-image: radial-gradient(#EAEAEA 1.5px, transparent 0);
            background-size: 24px 24px;
            display: flex;
            flex-direction: column; 
            border: 8px solid #FFDD33;
            position: relative;
            padding: 80px;
            box-sizing: border-box;
        }

        .sharp-text {
            transform: translateZ(0);
            backface-visibility: hidden;
            display: block;
            -webkit-font-smoothing: subpixel-antialiased;
        }

        .miro-title {
            font-size: 68px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -0.04em;
            line-height: 1.1;
            color: #1C1C1E;
        }

        .miro-highlight {
            background-color: #FFDD33;
            padding: 0 16px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 6px 6px 0px #1C1C1E;
        }

        .step-card {
            background: white;
            border: 4px solid #1C1C1E;
            box-shadow: 10px 10px 0px #1C1C1E;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 40px;
            border-radius: 40px;
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.1s steps(2);
        }

        .ps-action-pill {
            background-color: #47D1C4;
            color: #1C1C1E;
            padding: 10px 18px;
            border-radius: 14px;
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            font-size: 13px;
            margin-top: auto;
            border: 2px solid #1C1C1E;
            text-align: center;
            box-shadow: 4px 4px 0px #1C1C1E;
            position: relative;
            z-index: 10;
        }

        .action-link {
            background-color: #1C1C1E;
            color: #FFDD33;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: 900;
            font-style: italic;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            box-shadow: 3px 3px 0px #47D1C4;
            text-decoration: none;
            position: relative;
            z-index: 10;
        }

        .matrix-cell {
            border: 2px solid #1C1C1E;
            border-radius: 20px;
            padding: 18px 26px;
        }

        .csm-bg { background-color: rgba(134, 122, 255, 0.08); }
        .ps-bg { background-color: rgba(71, 209, 196, 0.08); }

        @keyframes pulse-yellow {
            0% { box-shadow: 0 0 0 0 rgba(255, 221, 51, 0.6); }
            70% { box-shadow: 0 0 0 25px rgba(255, 221, 51, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 221, 51, 0); }
        }

        .target-pulse {
            animation: pulse-yellow 2s infinite;
        }

        .icon-container {
            width: 64px;
            height: 64px;
            background-color: #1C1C1E;
            color: #FFDD33;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .ghost-number {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 140px;
            font-weight: 900;
            font-style: italic;
            color: rgba(28, 28, 30, 0.15);
            line-height: 1;
            z-index: 0;
            pointer-events: none;
            letter-spacing: -0.05em;
        }
    </style>
</head>
<body>
    <div id="root-container">
        <div id="root"></div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const useAutoScaler = () => {
            useEffect(() => {
                const scaler = () => {
                    const container = document.getElementById('root-container');
                    if (container) {
                        const scale = window.innerWidth / 1920;
                        container.style.transform = `scale(${Math.min(scale, 1)}) translate3d(0,0,0)`;
                    }
                };
                window.addEventListener('resize', scaler);
                scaler();
                return () => window.removeEventListener('resize', scaler);
            }, []);
        };

        const StepIcon = ({ type }) => {
            const icons = {
                sf: (
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                ),
                blueprint: (
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
                    </svg>
                ),
                pod: (
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                ),
                kickoff: (
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <path d="M15 10l-4 4l6 6l4-16l-18 7l4 2l2 6l3-4"/>
                    </svg>
                ),
                monitor: (
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                    </svg>
                )
            };
            return <div className="icon-container">{icons[type]}</div>;
        };

        const App = () => {
            useAutoScaler();

            const lifecycleSteps = [
                { id: 1, type: "sf", title: "SFアサインメント", details: "商談が「Closed Won」になった後、直ちにメインのSalesforce MOSTケースにアサインされます。", action: "担当の確認とディスカバリー" },
                { 
                    id: 2, 
                    type: "blueprint", 
                    title: "ブループリント準備", 
                    details: "以下のリンクから顧客のMOSTハブを作成し、ケースの「Blueprint Link」フィールドに追加します。次に、Confluenceの手順に従い時間管理（Hours）連携を設定します。", 
                    action: "ブループリント作成と時間連携", 
                    links: [
                        { label: "ブループリント・テンプレート", url: "https://miro.com/app/board/uXjVGewbhus=/" }, 
                        { label: "時間連携ガイド", url: "https://miro.atlassian.net/wiki/spaces/OS/pages/5231018453/MOST+Hours+Utilization+Integration+Guide" }
                    ] 
                },
                { id: 3, type: "pod", title: "チーム（Pod）連携", details: "担当CSMへ連絡します。フレームワークの構築を支援し、キックオフの出席日程を調整します。", action: "アーキテクトとの戦略すり合わせ" },
                { id: 4, type: "kickoff", title: "キックオフ・コール", details: "CSMが戦略を主導し、PSが技術的観点から検証します。【目標】コール終了時点で、Q1（第1四半期）の計画を確定させること。", action: "スコープとQ1計画の検証" },
                { 
                    id: 5, 
                    type: "monitor", 
                    title: "継続的なモニタリング", 
                    details: "70%のしきい値を基準に利用状況を評価します。Q1の月次定例コールをスケジュールし、プロジェクトと消費時間を報告します。", 
                    action: "月次コールと時間監査", 
                    links: [
                        { label: "アカウント別 プロジェクト＆時間レポート", url: "https://rtb.lightning.force.com/lightning/r/Report/00ORO00000mbVNr2AM/view?queryScope=userFolders" }
                    ] 
                }
            ];

            const matrixRows = [
                { 
                    label: "アカウント戦略", 
                    csm: "【オーナー】戦略における単独の責任者。Joint Success Plan（JSP）とビジネス成果に責任を持ちます。定例会議を実施し、戦略的優先事項を把握します。", 
                    ps: "【コンサルタント】戦略的フレームワークがMiroのベストプラクティスに適合するよう、技術的なインプットを提供します。" 
                },
                { 
                    label: "MOST ロードマップ", 
                    csm: "【アーキテクト】上位の優先順位を定義し、新規の支援リクエストを受け付けます。定期的に認識合わせを行い、変化するニーズを吸い上げます。", 
                    ps: "【アドバイザー】顧客の目標と専門家の利用可能時間を結びつけるための、技術的なフレームワーク構築を支援します。" 
                },
                { 
                    label: "リクエスト受付", 
                    csm: "【リード】定例会議の成果に基づき、アカウントレベルでのすべてのサービスケースをSalesforceに入力・提出する責任を負います。", 
                    ps: "【サポート】デリバリーの専門家が「すぐに作業開始できる」状態になるよう、要件の明確化とスコープ定義を支援します。" 
                },
                { 
                    label: "利用時間トラッキング", 
                    csm: "【コマーシャル・オーナー】契約更新とビジネス面の健全性の責任者。定例会議で価値の実現状況を確認し、必要に応じて利用ペースを調整します。", 
                    ps: "【監視】消費のトレンドをモニタリングし、利用率低下のリスクがあればプロアクティブにCSMチームへアラートを出します。" 
                },
                { 
                    label: "プロジェクト納品", 
                    csm: "【状況把握】関係性の価値向上と定着化を推進するため、定期的なチェックインを通じてプロジェクト全体の進捗状況を把握します。", 
                    ps: "【実行責任】デリバリーの品質を監督します。実際の構築作業は、プールされた専門家チームによって行われます。" 
                }
            ];

            return (
                <div className="canvas-bg select-none">
                    {/* Header Section */}
                    <div className="flex justify-between items-end mb-20 sharp-text">
                        <div>
                            <div className="flex items-center gap-4 mb-4">
                                <span className="bg-[#1C1C1E] text-white px-5 py-2 text-sm font-black uppercase tracking-[0.3em] rounded-lg">運用・監視のリズム</span>
                                <div className="h-[3px] w-48 bg-[#1C1C1E]/10"></div>
                            </div>
                            <h1 className="miro-title"><span className="miro-highlight">MOST PS 運用モデル</span></h1>
                        </div>
                        <div className="bg-[#1C1C1E] text-white px-10 py-8 rounded-[3rem] border-[6px] border-[#FFDD33] target-pulse text-center">
                            <p className="text-[12px] font-black uppercase tracking-widest text-[#FFDD33] mb-2">介入しきい値</p>
                            <p className="text-6xl font-[900] italic leading-none tracking-tighter uppercase">最低 <span className="text-4xl">70%</span></p>
                            <p className="text-sm font-black mt-2 uppercase italic tracking-widest text-[#FFDD33]">残り42時間を下回った場合はアラート発報</p>
                        </div>
                    </div>

                    {/* Operational Lifecycle Section */}
                    <div className="flex gap-8 mb-12 h-[680px]">
                        {lifecycleSteps.map((step) => (
                            <div key={step.id} className="flex-1 step-card">
                                <div className="ghost-number">0{step.id}</div>
                                <StepIcon type={step.type} />
                                <h3 className="text-2xl font-[900] leading-tight tracking-tight mb-4 text-[#1C1C1E] relative z-10 sharp-text">{step.title}</h3>
                                <p className="text-lg font-bold text-[#1C1C1E]/70 leading-relaxed mb-4 flex-1 relative z-10 sharp-text">{step.details}</p>
                                <div className="space-y-1 mb-4 relative z-10 sharp-text">
                                    {step.links && step.links.map((link, idx) => (
                                        <a key={idx} href={link.url} target="_blank" className="action-link">
                                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                            {link.label}
                                        </a>
                                    ))}
                                </div>
                                <div className="ps-action-pill sharp-text">PS タスク: {step.action}</div>
                            </div>
                        ))}
                    </div>

                    {/* Critical Boundary Divider Section */}
                    <div className="w-full bg-[#1C1C1E] rounded-[3rem] p-8 mb-12 flex flex-col items-center justify-center border-[6px] border-[#FFDD33] shadow-[12px_12px_0px_rgba(0,0,0,0.1)] sharp-text text-center">
                        <span className="text-[#FFDD33] font-black uppercase tracking-widest text-xs mb-2">重要な役割の境界線</span>
                        <h2 className="text-white text-4xl font-[900] italic leading-tight tracking-tight mb-3">MOSTは「簡易版TAM」ではありません</h2>
                        <p className="text-white/80 text-xl font-bold max-w-4xl mx-auto leading-relaxed">
                            私たちは特定のサブスクリプションに対する「プロセスの監視」を提供します。キックオフやスコープ定義時の技術的な検証者であり、テクニカルアカウントマネージャー（TAM）のように専任の代弁者として組み込まれるわけではありません。
                        </p>
                    </div>

                    {/* Accountability Matrix */}
                    <div className="bg-white border-4 border-[#1C1C1E] rounded-[4rem] p-16 flex flex-col shadow-[16px_16px_0px_#1C1C1E]">
                        <div className="grid grid-cols-12 gap-8 mb-12 sharp-text">
                            <div className="col-span-2">
                                <h3 className="text-xl font-black uppercase tracking-widest text-[#1C1C1E]/40 italic underline decoration-4 underline-offset-8">責任分界マトリクス</h3>
                            </div>
                            <div className="col-span-5 flex flex-col items-center gap-2">
                                <div className="flex items-center gap-3">
                                    <div className="w-6 h-6 rounded-full bg-[#867AFF] border-2 border-[#1C1C1E]"></div>
                                    <span className="text-3xl font-black uppercase tracking-widest text-[#1C1C1E]">CSMの役割</span>
                                </div>
                                <span className="bg-[#867AFF]/20 text-[#867AFF] px-6 py-2 rounded-full text-sm font-black uppercase tracking-[0.2em] border border-[#867AFF]/30 shadow-sm">
                                    戦略立案部門
                                </span>
                            </div>
                            <div className="col-span-5 flex flex-col items-center gap-2">
                                <div className="flex items-center gap-3">
                                    <div className="w-6 h-6 rounded-full bg-[#47D1C4] border-2 border-[#1C1C1E]"></div>
                                    <span className="text-3xl font-black uppercase tracking-widest text-[#1C1C1E]">PSの役割</span>
                                </div>
                                <span className="bg-[#47D1C4]/20 text-[#47D1C4] px-6 py-2 rounded-full text-sm font-black uppercase tracking-[0.2em] border border-[#47D1C4]/30 shadow-sm">
                                    技術実行部門
                                </span>
                            </div>
                        </div>

                        <div className="space-y-6 sharp-text">
                            {matrixRows.map((row, i) => (
                                <div key={i} className="grid grid-cols-12 gap-8 items-stretch">
                                    <div className="col-span-2 text-2xl font-black text-[#1C1C1E] leading-tight flex items-center">{row.label}</div>
                                    <div className="col-span-5 matrix-cell csm-bg flex items-center p-8">
                                        <p className="text-xl font-bold text-[#1C1C1E] leading-relaxed">
                                            {row.csm}
                                        </p>
                                    </div>
                                    <div className="col-span-5 matrix-cell ps-bg flex items-center p-8">
                                        <p className="text-xl font-bold text-[#1C1C1E] leading-relaxed">
                                            {row.ps}
                                        </p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    
                    {/* Bottom Signature */}
                    <div className="mt-24 pt-10 border-t-4 border-[#1C1C1E]/5 flex justify-center opacity-30 italic sharp-text">
                        <div className="text-sm font-black uppercase tracking-[0.5em]">MIRO PROFESSIONAL SERVICES</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
