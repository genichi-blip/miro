            padding: 0;
            overflow: hidden;
            background-color: #FFFFFF;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;

            -webkit-font-smoothing: antialiased;

        .sharp-text {
            -webkit-font-smoothing: antialiased;
            backface-visibility: hidden;
            display: block;
            transform: none !important;
            position: relative;
            z-index: 50;

        .miro-highlight {
            background-color: #FFDD33;
            padding: 0 12px;
            border-radius: 8px;
            display: inline-block;

            box-shadow: 4px 4px 0px 0px #1C1C1E;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        
        .card-container:hover {
            transform: translateY(-4px);
            box-shadow: 8px 8px 0px 0px #1C1C1E;
        }

        .animate-enter {
            animation: enter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes enter {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide generic scrollbars but allow internal overflow if needed */
        ::-webkit-scrollbar { display: none; }

                            <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                                {plan.workstreams.map((ws, idx) => (
                                    <div key={idx} className="flex justify-between items-center gap-3 border-b-2 border-[#1C1C1E]/5 pb-3 last:border-0">
                                        <div className="flex items-center gap-2">
                                            <div className="w-1.5 h-1.5 rounded-full bg-[#1C1C1E]/30 shrink-0"></div>
                                            <span className="text-[13px] font-bold tracking-tight leading-tight text-[#1C1C1E] sharp-text">{ws.name}</span>
                                        </div>
                                        <span className="text-[10px] font-black text-[#1C1C1E] bg-[#EAEAEA] px-2 py-1 rounded-md whitespace-nowrap">~{ws.hrs}h</span>
                                    </div>
                                ))}
                            </div>
                            
                            <div className="mt-auto pt-6 border-t-4 border-[#1C1C1E] shrink-0">
                                <div className="flex items-end gap-2 text-[#1C1C1E]">
                                    <span className="text-[48px] font-[900] italic leading-[0.7] tracking-tighter sharp-text">{totalHrs}</span>
                                    <span className="text-[14px] font-black italic mb-0.5 uppercase">Estimated Hrs</span>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const App = () => {
            useAutoScaler();
            const [selectedPlan, setSelectedPlan] = useState(null);

            return (
                <div className="canvas-bg select-none">
                    {selectedPlan ? (
                        <DetailView plan={selectedPlan} onBack={() => setSelectedPlan(null)} />
                    ) : (
                        <GridView onSelect={setSelectedPlan} />
                    )}

                    {/* Footer / Watermark */}
                    <div className="absolute bottom-6 left-12 right-12 flex justify-between items-center opacity-30 pointer-events-none sharp-text z-50">
                        <div className="text-[#1C1C1E] font-black italic uppercase text-[11px] tracking-[0.2em]">Miro Professional Services</div>
                        <div className="text-[#1C1C1E] font-black italic uppercase text-[11px] tracking-[0.2em]">© 2026 MIRO PROSERV JP</div>
                    </div>
                    <div className="absolute -bottom-10 -right-10 text-[220px] font-[900] italic uppercase text-[#1C1C1E]/[0.03] tracking-tighter pointer-events-none z-0">
                        MIRO
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
